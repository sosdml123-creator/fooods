<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>플레이팅 - 오늘의집 스타일 푸드 커뮤니티</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  
  <!-- SEO 메타 태그 -->
  <meta name="description" content="나만의 레시피와 조리도구를 공유하고 수익을 창출하는 푸드 커뮤니티">
  <meta name="keywords" content="요리, 레시피, 주방용품, 조리도구, 음식 커뮤니티, 플레이팅">
  
  <!-- 구글 폰트: Noto Sans KR & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome 아이콘 CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 네이버 지도 Open API SDK (Client ID: m16cxm6bi2) -->
  <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=m16cxm6bi2"></script>
  <script>
    window.navermap_authFailure = function() {
      console.warn("네이버 지도 API 인증 실패: Web 서비스 URL을 NCP 콘솔에 등록해야 합니다.");
    };
  </script>
  
  <!-- Tailwind CSS Local -->
  <script src="/tailwindcss.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans KR', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- 커스텀 스타일시트 -->
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    html, body {
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      user-select: none;
      -webkit-user-select: none;
    }
    input, textarea {
      user-select: text !important;
      -webkit-user-select: text !important;
    }
    .bottom-nav {
      grid-template-columns: repeat(5, 1fr) !important;
    }
    .hashtag-link {
      color: #2563eb !important; /* blue-600 */
      font-weight: 500;
      cursor: pointer;
    }
    .hashtag-link:hover {
      text-decoration: underline;
    }
    body {
      letter-spacing: -0.025em;
    }
  </style>
  <script>
    // 핀치 줌 및 두 손가락 확대 방지 스크립트
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturechange', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gestureend', function (e) { e.preventDefault(); }, { passive: false });
    
    // 더블 탭 확대 방지
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        if (event.target.tagName !== 'INPUT' && event.target.tagName !== 'TEXTAREA') {
          event.preventDefault();
        }
      }
      lastTouchEnd = now;
    }, false);
  </script>
</head>
<body class="bg-zinc-50 text-zinc-900 font-sans antialiased">

  <div id="root"></div>

  <!-- Vite module entry script -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
