  </defs>
  <rect width="100%" height="100%" fill="url(#gmarketGrad)" rx="45" />
  <g filter="url(#shadow)">
    <text x="100" y="115" font-family="'Inter', 'Outfit', sans-serif" font-weight="900" font-size="80" fill="#ffffff" text-anchor="middle">G</text>
    <text x="100" y="160" font-family="'Inter', 'Outfit', sans-serif" font-weight="800" font-size="20" fill="#00FF85" text-anchor="middle" letter-spacing="2">MARKET</text>
